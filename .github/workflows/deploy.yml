# MASS Backend — CI/CD Pipeline
#
# Jobs:
#   test   — runs on every push and PR; required to pass before deploy
#   deploy — runs only on pushes to main after test passes
#
# Required GitHub repository secrets (Settings > Secrets and variables > Actions):
#   GCP_PROJECT_ID                — GCP project ID (e.g. my-project-123456)
#   GCP_WORKLOAD_IDENTITY_PROVIDER — Full WIF provider resource name:
#                                    projects/PROJECT_NUMBER/locations/global/
#                                    workloadIdentityPools/POOL_ID/providers/PROVIDER_ID
#   GCP_SERVICE_ACCOUNT           — SA email: mass-deploy@PROJECT_ID.iam.gserviceaccount.com
#
# Required GitHub repository variables (Settings > Secrets and variables > Variables):
#   GCP_REGION  — Cloud Run region (e.g. us-central1). Defaults to us-central1.
#
# One-time GCP Workload Identity setup:
#   gcloud iam workload-identity-pools create "github-pool" --location="global" \
#     --display-name="GitHub Actions Pool"
#
#   gcloud iam workload-identity-pools providers create-oidc "github-provider" \
#     --location="global" --workload-identity-pool="github-pool" \
#     --attribute-mapping="google.subject=assertion.sub,attribute.repository=assertion.repository" \
#     --issuer-uri="https://token.actions.githubusercontent.com"
#
#   gcloud iam service-accounts add-iam-policy-binding \
#     mass-deploy@PROJECT_ID.iam.gserviceaccount.com \
#     --role="roles/iam.workloadIdentityUser" \
#     --member="principalSet://iam.googleapis.com/projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/attribute.repository/Awehbelekker/universal-mass-framework"

name: CI/CD — MASS Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write   # Required for Workload Identity Federation OIDC token exchange

jobs:
  # ── Test gate ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (including dev extras)
        run: uv sync --frozen --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  # ── Deploy (main branch only, after tests pass) ───────────────────────────
  deploy:
    name: Deploy to Cloud Run
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Docker image via Cloud Build
        run: |
          gcloud builds submit \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/mass-backend \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy mass-backend \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/mass-backend \
            --platform managed \
            --region ${{ vars.GCP_REGION || 'us-central1' }} \
            --port 8080 \
            --no-allow-unauthenticated \
            --set-env-vars MASS_ENV=production \
            --project ${{ secrets.GCP_PROJECT_ID }}
