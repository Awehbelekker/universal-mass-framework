name: CI/CD Pipeline for MASS Framework

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Frontend Testing and Building
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test -- --coverage --watchAll=false

      - name: Run frontend linting
        working-directory: ./frontend
        run: npm run lint || true

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/build/

  # Backend Testing
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r test_requirements.txt

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          TESTING: true
        run: |
          pytest tests/ -v --cov=core --cov=universal_mass_framework --cov-report=xml --cov-report=html

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: backend
          name: backend-coverage

  # Security Scan
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Deploy Frontend to Firebase
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [frontend, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: |
          # Deploy to Firebase
          firebase deploy --only hosting

      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          # Test the deployed app
          sleep 30
          curl -f https://$(firebase projects:list --json | jq -r '.result[0].projectId').web.app/ || true

  # Deploy Backend to Cloud Run
  deploy-backend:
    runs-on: ubuntu-latest
    needs: [backend-test, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build and push Docker image
        run: |
          gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/mass-backend .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy mass-backend \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/mass-backend \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --port 8080

  # Final Status Check
  status-check:
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always()
    steps:
      - name: Generate deployment report
        run: |
          echo "## MASS Framework Deployment Summary" >> deployment-report.md
          echo "" >> deployment-report.md
          echo "**Deployment Date:** $(date)" >> deployment-report.md
          echo "**Repository:** ${{ github.repository }}" >> deployment-report.md
          echo "**Branch:** ${{ github.ref_name }}" >> deployment-report.md
          echo "**Commit:** ${{ github.sha }}" >> deployment-report.md
          echo "" >> deployment-report.md
          echo "### Job Status:" >> deployment-report.md
          echo "- Frontend Tests: ${{ needs.frontend.result }}" >> deployment-report.md
          echo "- Backend Tests: ${{ needs.backend-test.result }}" >> deployment-report.md
          echo "- Security Scan: ${{ needs.security-scan.result }}" >> deployment-report.md
          echo "- Frontend Deploy (Firebase): ${{ needs.deploy-frontend.result }}" >> deployment-report.md
          echo "- Backend Deploy (Cloud Run): ${{ needs.deploy-backend.result }}" >> deployment-report.md
          echo "" >> deployment-report.md
          echo "### Deployment URLs:" >> deployment-report.md
          echo "- **Frontend (Firebase Hosting):** https://$(firebase projects:list --json | jq -r '.result[0].projectId').web.app" >> deployment-report.md
          echo "- **Backend (Cloud Run):** $(gcloud run services describe mass-backend --platform managed --region us-central1 --format 'value(status.url)')" >> deployment-report.md
          echo "" >> deployment-report.md
          echo "### Next Steps:" >> deployment-report.md
          echo "1. Test the deployed application" >> deployment-report.md
          echo "2. Monitor application performance" >> deployment-report.md
          echo "3. Set up monitoring and alerting" >> deployment-report.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('deployment-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

      - name: Upload deployment report
        uses: actions/upload-artifact@v3
        with:
          name: deployment-report
          path: deployment-report.md 
