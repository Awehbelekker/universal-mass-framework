# Universal MASS Framework - Monitoring Configuration
# Staging Environment

# Prometheus Configuration
global:
  scrape_interval: 15s
  external_labels:
    environment: staging
    project: mass-framework

scrape_configs:
  - job_name: 'mass-engine'
    static_configs:
      - targets: ['mass-engine:8000']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'data-processors'
    static_configs:
      - targets: ['data-processors:8001']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'intelligence-agents'
    static_configs:
      - targets: ['intelligence-agents:8002']
    metrics_path: /metrics
    scrape_interval: 10s

# Alert Rules
rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093
