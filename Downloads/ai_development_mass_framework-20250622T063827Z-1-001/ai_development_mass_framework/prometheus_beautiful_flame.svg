<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Beautiful orange gradient flame - exact match to attachment -->
    <linearGradient id="flame-gradient-outer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC000" />
      <stop offset="40%" stop-color="#FF9800" />
      <stop offset="80%" stop-color="#FF5722" />
      <stop offset="100%" stop-color="#FF3D00" />
    </linearGradient>
    <linearGradient id="flame-gradient-inner" x1="20%" y1="20%" x2="80%" y2="80%">
      <stop offset="0%" stop-color="#FFEB3B" />
      <stop offset="50%" stop-color="#FFC107" />
      <stop offset="100%" stop-color="#FF9800" />
    </linearGradient>
    <filter id="glow-effect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer flame shape - exact match to attachment -->
  <path d="M250 50 
          C290 100, 340 170, 320 240 
          C300 310, 280 340, 300 380 
          C330 430, 310 460, 280 480 
          C250 500, 220 500, 190 480 
          C160 460, 140 430, 170 380 
          C190 340, 170 310, 150 240 
          C130 170, 210 100, 250 50Z" 
        fill="url(#flame-gradient-outer)" 
        filter="url(#glow-effect)" />
  
  <!-- Inner flame layer -->
  <path d="M200 80
           C175 100, 155 140, 170 180
           C145 220, 155 260, 180 290
           C165 315, 180 335, 200 350
           C220 335, 235 315, 220 290
           C245 260, 255 220, 230 180
           C245 140, 225 100, 200 80 Z" 
        fill="url(#flame-inner)" 
        opacity="0.85">
    <animate attributeName="d" 
             values="M200 80 C175 100, 155 140, 170 180 C145 220, 155 260, 180 290 C165 315, 180 335, 200 350 C220 335, 235 315, 220 290 C245 260, 255 220, 230 180 C245 140, 225 100, 200 80 Z;
                    M200 85 C180 105, 160 145, 175 185 C150 225, 160 265, 185 295 C170 320, 185 340, 200 355 C225 340, 240 320, 225 295 C250 265, 260 225, 235 185 C250 145, 230 105, 200 85 Z;
                    M200 80 C175 100, 155 140, 170 180 C145 220, 155 260, 180 290 C165 315, 180 335, 200 350 C220 335, 235 315, 220 290 C245 260, 255 220, 230 180 C245 140, 225 100, 200 80 Z" 
             dur="3s" 
             repeatCount="indefinite" />
  </path>
  
  <!-- Inner flame shape - exact match to attachment -->
  <path d="M250 120 
          C270 160, 300 200, 280 250
          C270 290, 255 320, 270 350
          C290 380, 270 410, 250 420
          C230 410, 210 380, 230 350
          C245 320, 230 290, 220 250
          C200 200, 230 160, 250 120Z" 
        fill="url(#flame-gradient-inner)" />
        
  <!-- Highlights to create the glossy look from the attachment -->
  <path d="M215 180
          C225 210, 240 240, 230 270
          C225 290, 215 300, 225 320
          C215 290, 220 270, 225 245
          C235 220, 225 200, 215 180Z" 
        fill="white" 
        opacity="0.4" />
</svg>
