apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mass-framework-ingress
  namespace: mass-framework
  labels:
    app: mass-framework
    component: ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - mass-framework.com
    - api.mass-framework.com
    secretName: mass-framework-tls
  rules:
  - host: mass-framework.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mass-frontend
            port:
              number: 80
  - host: api.mass-framework.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mass-backend
            port:
              number: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: mass-framework-loadbalancer
  namespace: mass-framework
  labels:
    app: mass-framework
    component: loadbalancer
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  - port: 443
    targetPort: 443
    protocol: TCP
    name: https
  selector:
    app: nginx-ingress-controller
