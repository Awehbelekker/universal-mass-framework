apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mass-data-pvc
  namespace: mass-framework
  labels:
    app: mass-framework
    component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
---
