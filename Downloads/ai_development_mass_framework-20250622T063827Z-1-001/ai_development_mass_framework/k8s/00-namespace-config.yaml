apiVersion: v1
kind: Namespace
metadata:
  name: mass-framework
  labels:
    name: mass-framework
    environment: production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mass-config
  namespace: mass-framework
data:
  MASS_ENVIRONMENT: "production"
  REACT_APP_ENVIRONMENT: "production"
  REACT_APP_API_URL: "https://api.mass-framework.com"
  JWT_EXPIRY_HOURS: "24"
  MAX_WORKERS: "4"
