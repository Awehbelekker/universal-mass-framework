apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mass-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: fast-ssd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mass-logs-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
---
apiVersion: v1
kind: Secret
metadata:
  name: mass-secrets
type: Opaque
data:
  # Base64 encoded values - replace with actual secrets
  database-url: cG9zdGdyZXNxbDovL21hc3NfdXNlcjpwYXNzd29yZEBwb3N0Z3Jlcy1zZXJ2aWNlOjU0MzIvbWFzc19kYg==
  openai-api-key: eW91ci1vcGVuYWktYXBpLWtleQ==
  anthropic-api-key: eW91ci1hbnRocm9waWMtYXBpLWtleQ==
  jwt-secret: eW91ci1qd3Qtc2VjcmV0LWtleQ==
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mass-config
data:
  MASS_ENVIRONMENT: "production"
  RATE_LIMIT_REQUESTS: "1000"
  RATE_LIMIT_WINDOW: "3600"
  MAX_WORKERS: "4"
  LOG_LEVEL: "INFO"
