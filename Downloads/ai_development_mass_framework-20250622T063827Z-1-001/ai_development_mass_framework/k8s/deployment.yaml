
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mass-framework
  labels:
    app: mass-framework
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mass-framework
  template:
    metadata:
      labels:
        app: mass-framework
    spec:
      containers:
      - name: mass-framework
        image: mass-framework:latest
        ports:
        - containerPort: 8000
        - containerPort: 8001
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mass-framework-service
spec:
  selector:
    app: mass-framework
  ports:
  - name: api
    port: 8000
    targetPort: 8000
  - name: health
    port: 8001
    targetPort: 8001
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mass-framework-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: mass-framework.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mass-framework-service
            port:
              number: 8000
