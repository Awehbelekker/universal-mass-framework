apiVersion: apps/v1
kind: Deployment
metadata:
  name: mass-frontend
  namespace: mass-framework
  labels:
    app: mass-frontend
    component: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mass-frontend
  template:
    metadata:
      labels:
        app: mass-frontend
        component: frontend
    spec:
      containers:
      - name: mass-frontend
        image: mass-framework/frontend:latest
        ports:
        - containerPort: 80
          name: http
        env:
        - name: REACT_APP_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: mass-config
              key: REACT_APP_ENVIRONMENT
        - name: REACT_APP_API_URL
          valueFrom:
            configMapKeyRef:
              name: mass-config
              key: REACT_APP_API_URL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: mass-frontend
  namespace: mass-framework
  labels:
    app: mass-frontend
    component: frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: mass-frontend
